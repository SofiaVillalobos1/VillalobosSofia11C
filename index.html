<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sofía Villalobos</title>
    <link rel="icon" type="image/png" href="recursos/IMG/logo1.png">
    
    <style>
      html, body {
        height: 100%;
        margin: 0;
        font-family: Arial, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        text-align: center;
      }
      header {
        padding: 20px;
        background-color: rgb(100, 75, 212);
      }
      h1 {
        color: #fff;
        text-shadow: 0 0 5px #bf00ff, 0 0 20px #bf00ff, 0 0 40px #bf00ff;
      }
      main {
        flex: 1;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
        width: 90%;
      }
      footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 50px;
        border-top: 10px solid rgb(198, 198, 170);
        background-color: dimgray;
      }
      .semana {
        background-color: #ffffff;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 4px 15px rgba(39, 58, 114, 0.592);
        border-left: 5px solid rgb(36, 15, 168);
        transition: box-shadow 0.3s ease;
        text-align: left;
      }
      .semana:hover {
        box-shadow: 0 8px 25px rgba(188, 19, 254, 0.2);
      }
      /* Estilo para las imágenes dentro de las tarjetas */
      .semana img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        margin-top: 10px;
      }
      @media(max-width:600px){
        footer {
          flex-direction: column;
          gap: 15px;
          padding: 20px;
        }
      }
      footer img {
        transition: transform 0.3s ease;
      }
      footer img:hover {
        transform: scale(1.2);
        cursor: pointer;
      }
    </style>
</head>
<body>

  <header>
      <h1>Bitácora segunda unidad</h1>
  </header>

  <main>
      <div class="semana">
          <h3>Semana 1: Introducción a Arduino</h3>
          <p>Visualización del documento:</p>
          <embed src="recursos/Introducción Arduino (1).pdf" type="application/pdf" width="100%" height="400px" target="_blank">
      </div>

      <div class="semana">
          <h3>Semana 2: Introducción a TinkerCard</h3>
          <p>Captura de mi proyecto:</p>
          <img src="recursos/IMG/images.jpg" alt="Captura TinkerCard">
      </div>

      <div class="semana">
          <h3>Semana 3</h3>
          <p>Estructura de la página web</p>
      </div>
  </main>

  <footer>
    <span>@sofia_villalobosc</span>
    <img src="https://www.capouilliez.edu.gt/assets/img/logo.png" height="75" width="300">
  </footer>

</body>
</html>
